<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMK Analytics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px 32px; border-bottom: 1px solid #2a2a3e; }
        .header h1 { font-size: 24px; color: #fff; }
        .header p { font-size: 14px; color: #888; margin-top: 4px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; }
        .card h3 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card .value { font-size: 32px; font-weight: 700; color: #fff; }
        .card .sub { font-size: 12px; color: #666; margin-top: 4px; }
        .section { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
        .section h2 { font-size: 16px; color: #fff; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #2a2a3e; font-size: 14px; }
        th { color: #888; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        td { color: #e0e0e0; }
        .bar { height: 8px; background: #2a2a3e; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; background: #2a2a3e; color: #a5b4fc; }
        .refresh { float: right; background: #6366f1; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .refresh:hover { background: #4f46e5; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { background: #2d1b1b; border: 1px solid #5c2a2a; color: #f87171; padding: 16px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 LMK Analytics Dashboard</h1>
        <p>Real-time analytics for your AI Real Estate Agency</p>
    </div>
    <div class="container">
        <button class="refresh" onclick="loadData()">⟳ Refresh</button>
        <div style="clear:both"></div>
        <br>
        <div id="content"><div class="loading">Loading analytics...</div></div>
    </div>

    <script>
        const ADMIN_KEY = 'lmk-admin-2026';

        async function loadData() {
            const el = document.getElementById('content');
            el.innerHTML = '<div class="loading">Loading analytics...</div>';
            try {
                const res = await fetch(`/api/analytics/dashboard?key=${ADMIN_KEY}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderDashboard(data);
            } catch (e) {
                el.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
            }
        }

        function renderDashboard(data) {
            const el = document.getElementById('content');
            const maxAgent = Math.max(1, ...data.agent_popularity.map(a => a.messages));

            let dailyHtml = '';
            const days = [...new Set(data.daily_breakdown.map(d => d.day))].sort().slice(-7);
            const types = ['page_view', 'chat_message', 'chat_open', 'custom'];
            days.forEach(day => {
                let bars = '';
                types.forEach(type => {
                    const item = data.daily_breakdown.find(d => d.day === day && d.type === type);
                    const count = item ? item.count : 0;
                    const pct = data.total_events > 0 ? Math.round((count / data.total_events) * 100) : 0;
                    const colors = { page_view: '#6366f1', chat_message: '#8b5cf6', chat_open: '#06b6d4', custom: '#f59e0b' };
                    bars += `<div style="display:flex;align-items:center;gap:8px;margin:2px 0">
                        <span style="width:80px;font-size:11px;color:#888">${type.replace('_',' ')}</span>
                        <div class="bar" style="flex:1"><div class="bar-fill" style="width:${pct}%;background:${colors[type]}"></div></div>
                        <span style="width:30px;text-align:right;font-size:12px;color:#aaa">${count}</span>
                    </div>`;
                });
                dailyHtml += `<div style="margin-bottom:12px">
                    <div style="font-size:13px;font-weight:600;color:#ccc;margin-bottom:4px">${day}</div>
                    ${bars}
                </div>`;
            });

            let agentsHtml = data.agent_popularity.map(a => {
                const pct = Math.round((a.messages / maxAgent) * 100);
                return `<tr>
                    <td><span class="badge">${a.agent}</span></td>
                    <td><strong>${a.messages}</strong></td>
                    <td style="width:200px"><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></td>
                </tr>`;
            }).join('');

            let pagesHtml = data.top_pages.map(p => {
                const maxViews = Math.max(...data.top_pages.map(x => x.views));
                const pct = Math.round((p.views / maxViews) * 100);
                return `<tr>
                    <td><code style="color:#a5b4fc">${p.path}</code></td>
                    <td><strong>${p.views}</strong></td>
                    <td><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></td>
                </tr>`;
            }).join('');

            el.innerHTML = `
                <div class="grid">
                    <div class="card">
                        <h3>Total Events (7d)</h3>
                        <div class="value">${data.total_events}</div>
                        <div class="sub">All tracked activity</div>
                    </div>
                    <div class="card">
                        <h3>Unique Visitors</h3>
                        <div class="value">${data.unique_visitors}</div>
                        <div class="sub">Last 7 days</div>
                    </div>
                    <div class="card">
                        <h3>Chat Messages</h3>
                        <div class="value">${data.chat_messages}</div>
                        <div class="sub">User conversations</div>
                    </div>
                    <div class="card">
                        <h3>Period</h3>
                        <div class="value" style="font-size:18px">7 Days</div>
                        <div class="sub">Rolling window</div>
                    </div>
                </div>
                <div class="grid">
                    <div class="section" style="margin-bottom:0">
                        <h2>🤖 Agent Popularity</h2>
                        <table>
                            <tr><th>Agent</th><th>Messages</th><th>Share</th></tr>
                            ${agentsHtml}
                        </table>
                    </div>
                    <div class="section" style="margin-bottom:0">
                        <h2>📄 Top Pages</h2>
                        <table>
                            <tr><th>Path</th><th>Views</th><th>Share</th></tr>
                            ${pagesHtml || '<tr><td colspan="3" style="color:#666">No page views yet</td></tr>'}
                        </table>
                    </div>
                </div>
                <div class="section">
                    <h2>📅 Daily Breakdown</h2>
                    ${dailyHtml || '<div style="color:#666">No activity recorded yet</div>'}
                </div>
            `;
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
