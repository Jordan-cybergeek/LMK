<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMK Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --sidebar-w: 240px;
            --bg-primary: #0d0d14;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2e;
            --bg-hover: #22223a;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.15);
            --text-primary: #f1f1f4;
            --text-secondary: #8b8ba3;
            --text-muted: #5a5a72;
            --border: #2a2a3d;
            --green: #22c55e;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --red: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* ─── Sidebar ──────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand .logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }

        .sidebar-brand .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-glow);
            color: var(--accent-light);
        }

        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 15px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer .user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-footer .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .sidebar-footer .user-info {
            font-size: 13px;
        }

        .sidebar-footer .user-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .sidebar-footer .user-role {
            color: var(--text-muted);
            font-size: 11px;
        }

        /* ─── Main Content ────────────────────────────── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--text-muted);
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            width: 200px;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .content {
            padding: 24px 32px;
        }

        /* ─── Stats Grid ──────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .stat-card.purple::before { background: var(--accent); }
        .stat-card.green::before { background: var(--green); }
        .stat-card.blue::before { background: var(--blue); }
        .stat-card.orange::before { background: var(--orange); }

        .stat-card .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .stat-card.purple .icon { background: var(--accent-glow); color: var(--accent-light); }
        .stat-card.green .icon { background: rgba(34,197,94,0.15); color: var(--green); }
        .stat-card.blue .icon { background: rgba(59,130,246,0.15); color: var(--blue); }
        .stat-card.orange .icon { background: rgba(245,158,11,0.15); color: var(--orange); }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .stat-card .trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            margin-top: 8px;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .stat-card .trend.up {
            background: rgba(34,197,94,0.1);
            color: var(--green);
        }

        /* ─── Panels ──────────────────────────────────── */
        .panels-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header h2 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .panel-body {
            padding: 20px;
        }

        /* ─── Agent Table ────────────────────────────── */
        .agent-table {
            width: 100%;
            border-collapse: collapse;
        }

        .agent-table th {
            text-align: left;
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .agent-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }

        .agent-table tr:last-child td {
            border-bottom: none;
        }

        .agent-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agent-cell img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .agent-cell .name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .agent-cell .role {
            font-size: 11px;
            color: var(--text-muted);
        }

        .progress-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            max-width: 120px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.active {
            background: rgba(34,197,94,0.1);
            color: var(--green);
        }

        .badge.busy {
            background: rgba(245,158,11,0.1);
            color: var(--orange);
        }

        /* ─── Activity Feed ───────────────────────────── */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .activity-dot.purple { background: var(--accent); }
        .activity-dot.green { background: var(--green); }
        .activity-dot.blue { background: var(--blue); }
        .activity-dot.orange { background: var(--orange); }

        .activity-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .activity-text strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .activity-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ─── Chart placeholder ──────────────────────── */
        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 20px 0;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, var(--accent), var(--accent-light));
            border-radius: 4px 4px 0 0;
            opacity: 0.8;
            transition: all 0.3s;
            position: relative;
        }

        .chart-bar:hover {
            opacity: 1;
        }

        .chart-labels {
            display: flex;
            justify-content: space-between;
            padding-top: 8px;
        }

        .chart-labels span {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            flex: 1;
        }

        /* ─── Responsive ─────────────────────────────── */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .panels-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .stats-grid { grid-template-columns: 1fr; }
            .content { padding: 16px; }
        }

        /* ─── Loading ────────────────────────────────── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .loading i {
            margin-right: 8px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- ═══════════ SIDEBAR ═══════════ -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="logo">L</div>
        <span class="brand-name">LMK</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-item active">
            <i class="fas fa-chart-pie"></i>
            <span>Dashboard</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-robot"></i>
            <span>AI Agents</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-comments"></i>
            <span>Conversations</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-chart-line"></i>
            <span>Analytics</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </div>
    </nav>
    <div class="sidebar-footer">
        <div class="user">
            <div class="avatar">CB</div>
            <div class="user-info">
                <div class="user-name">CyberBatman</div>
                <div class="user-role">Admin</div>
            </div>
        </div>
    </div>
</aside>

<!-- ═══════════ MAIN ═══════════ -->
<main class="main">
    <div class="header">
        <h1>Analytics Dashboard</h1>
        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search...">
            </div>
            <button class="btn-icon" title="Refresh" onclick="loadData()">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="btn-icon" title="Notifications">
                <i class="fas fa-bell"></i>
            </button>
        </div>
    </div>

    <div class="content">
        <div id="dashboard">
            <div class="loading"><i class="fas fa-spinner"></i> Loading analytics...</div>
        </div>
    </div>
</main>

<script>
const ADMIN_KEY = 'lmk-admin-2026';
const AGENT_PHOTOS = {
    thandi: 'agents/Thandi.jpeg',
    jason: 'agents/Jason.jpeg',
    nadia: 'agents/Nadia.jpeg',
    pieter: 'agents/Pieter.jpeg',
    zinhle: 'agents/Zinhle.jpeg',
    david: 'agents/David.jpeg'
};

async function loadData() {
    const el = document.getElementById('dashboard');
    el.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Loading analytics...</div>';
    try {
        const res = await fetch(`/api/analytics/dashboard?key=${ADMIN_KEY}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderDashboard(data);
    } catch (e) {
        el.innerHTML = `<div class="error-msg"><i class="fas fa-exclamation-circle"></i> Failed to load: ${e.message}</div>`;
    }
}

function renderDashboard(data) {
    const maxMessages = Math.max(1, ...data.agent_popularity.map(a => a.messages));
    const maxViews = Math.max(1, ...data.top_pages.map(p => p.views));

    // Build chart bars
    const days = [...new Set(data.daily_breakdown.map(d => d.day))].sort().slice(-7);
    const chartBars = days.map(day => {
        const pv = data.daily_breakdown.filter(d => d.day === day && d.type === 'page_view')
            .reduce((s, d) => s + d.count, 0);
        const maxPv = Math.max(1, ...days.map(d => 
            data.daily_breakdown.filter(x => x.day === d && x.type === 'page_view').reduce((s, x) => s + x.count, 0)
        ));
        const height = Math.max(10, Math.round((pv / maxPv) * 100));
        return `<div class="chart-bar" style="height:${height}%" title="${day}: ${pv} views"></div>`;
    }).join('');

    const chartLabels = days.map(d => d.slice(5)).map(d => {
        const parts = d.split('-');
        return `${parts[1]}/${parts[2]}`;
    }).join('<span>');

    // Build agent table
    const agentRows = data.agent_popularity.map(a => {
        const pct = Math.round((a.messages / maxMessages) * 100);
        const photo = AGENT_PHOTOS[a.agent] || '';
        const names = { thandi: 'Thandi', jason: 'Jason', nadia: 'Nadia', pieter: 'Pieter', zinhle: 'Zinhle', david: 'David' };
        const roles = { thandi: 'Receptionist', jason: 'Sales Agent', nadia: 'Estate Agent', pieter: 'Support', zinhle: 'Booking', david: 'Property' };
        return `<tr>
            <td>
                <div class="agent-cell">
                    <img src="${photo}" alt="${a.agent}" onerror="this.style.background='#8b5cf6';this.style.color='#fff';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center';this.style.fontSize='12px';this.style.fontWeight='600';this.textContent='${(names[a.agent]||a.agent).charAt(0).toUpperCase()}'">
                    <div>
                        <div class="name">${names[a.agent] || a.agent}</div>
                        <div class="role">${roles[a.agent] || 'Agent'}</div>
                    </div>
                </div>
            </td>
            <td><strong>${a.messages}</strong></td>
            <td>
                <div class="progress-cell">
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <span style="font-size:12px;color:var(--text-muted)">${pct}%</span>
                </div>
            </td>
            <td><span class="badge active"><i class="fas fa-circle" style="font-size:6px"></i> Active</span></td>
        </tr>`;
    }).join('');

    // Build activity feed
    const recentEvents = data.daily_breakdown.slice(0, 8).map(e => {
        const colors = { page_view: 'blue', chat_message: 'purple', chat_open: 'green', custom: 'orange' };
        const labels = { page_view: 'Page view', chat_message: 'Chat message', chat_open: 'Chat opened', custom: 'Event' };
        const times = { page_view: '2 min ago', chat_message: '5 min ago', chat_open: '8 min ago', custom: '12 min ago' };
        return `<div class="activity-item">
            <div class="activity-dot ${colors[e.type] || 'purple'}"></div>
            <div>
                <div class="activity-text"><strong>${labels[e.type] || e.type}</strong> — ${e.count} occurrence${e.count > 1 ? 's' : ''} on ${e.day}</div>
                <div class="activity-time">${times[e.type] || 'Recently'}</div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('dashboard').innerHTML = `
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card purple">
                <div class="icon"><i class="fas fa-users"></i></div>
                <div class="value">${data.unique_visitors}</div>
                <div class="label">Unique Visitors</div>
                <div class="trend up"><i class="fas fa-arrow-up"></i> Last 7 days</div>
            </div>
            <div class="stat-card green">
                <div class="icon"><i class="fas fa-comments"></i></div>
                <div class="value">${data.chat_messages}</div>
                <div class="label">Chat Messages</div>
                <div class="trend up"><i class="fas fa-arrow-up"></i> Conversations</div>
            </div>
            <div class="stat-card blue">
                <div class="icon"><i class="fas fa-bolt"></i></div>
                <div class="value">${data.total_events}</div>
                <div class="label">Total Events</div>
                <div class="trend up"><i class="fas fa-arrow-up"></i> All activity</div>
            </div>
            <div class="stat-card orange">
                <div class="icon"><i class="fas fa-robot"></i></div>
                <div class="value">${data.agent_popularity.length}</div>
                <div class="label">Active Agents</div>
                <div class="trend up"><i class="fas fa-check"></i> All online</div>
            </div>
        </div>

        <!-- Panels -->
        <div class="panels-grid">
            <!-- Agent Performance -->
            <div class="panel">
                <div class="panel-header">
                    <h2><i class="fas fa-robot" style="margin-right:8px;color:var(--accent-light)"></i>Agent Performance</h2>
                    <span style="font-size:12px;color:var(--text-muted)">Last 7 days</span>
                </div>
                <div class="panel-body" style="padding:0">
                    <table class="agent-table">
                        <thead>
                            <tr>
                                <th>Agent</th>
                                <th>Messages</th>
                                <th>Share</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>${agentRows}</tbody>
                    </table>
                </div>
            </div>

            <!-- Activity Feed -->
            <div class="panel">
                <div class="panel-header">
                    <h2><i class="fas fa-clock" style="margin-right:8px;color:var(--accent-light)"></i>Recent Activity</h2>
                </div>
                <div class="panel-body">
                    <div class="activity-list">${recentEvents}</div>
                </div>
            </div>
        </div>

        <!-- Chart -->
        <div class="panel">
            <div class="panel-header">
                <h2><i class="fas fa-chart-bar" style="margin-right:8px;color:var(--accent-light)"></i>Page Views</h2>
                <span style="font-size:12px;color:var(--text-muted)">Daily breakdown</span>
            </div>
            <div class="panel-body">
                <div class="chart-container">${chartBars}</div>
                <div class="chart-labels">${chartLabels}</div>
            </div>
        </div>
    `;
}

// Initial load
loadData();
// Auto-refresh every 30s
setInterval(loadData, 30000);
</script>

</body>
</html>
